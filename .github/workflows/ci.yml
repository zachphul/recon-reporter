name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check recon_reporter tests
      - name: Types (mypy)
        run: mypy
      - name: Test
        run: pytest -q
